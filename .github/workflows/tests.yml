name: Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Build & Test
    runs-on: ubuntu-22.04
    container:
      image: debian:buster

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 'project(' CMakeLists.txt | grep -oP 'VERSION \K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Fix Buster repos 
        run: |
          echo "deb http://archive.debian.org/debian buster main contrib non-free" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list

      - name: Install dependencies
        run: |
          apt-get update -qq -o Acquire::Check-Valid-Until=false
          apt-get install -y --no-install-recommends \
            qtbase5-dev cmake ninja-build dpkg-dev \
            libqt5network5 git ca-certificates

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: debian-buster-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            debian-buster-deps-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -G Ninja

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen
